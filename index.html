<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>追番列表</title>
    <link rel="stylesheet" href="static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <h1>追番列表</h1>
            <p class="subtitle"><span id="username"></span> 的 Bangumi 追番记录</p>
            <p class="update-time">最后更新: <span id="update-time">-</span></p>
        </div>
    </header>

    <main class="container">
        <!-- 筛选栏 -->
        <div class="filters">
            <div class="filter-group">
                <button class="filter-btn active" data-status="all">全部</button>
                <button class="filter-btn" data-status="在看">在看</button>
                <button class="filter-btn" data-status="看过">看过</button>
                <button class="filter-btn" data-status="想看">想看</button>
                <button class="filter-btn" data-status="搁置">搁置</button>
            </div>
            <div class="search-box">
                <input type="text" id="search" placeholder="搜索番剧...">
            </div>
        </div>

        <!-- 统计信息 -->
        <div class="stats" id="stats"></div>

        <!-- 番剧列表 -->
        <div class="anime-grid" id="anime-grid">
            <div class="loading">加载中...</div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>数据来源: <a href="https://bgm.tv" target="_blank">Bangumi</a> | 每日自动更新</p>
        </div>
    </footer>

    <script src="static/script.js"></script>
</body>
</html>
