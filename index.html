<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>追番列表</title>
    <link rel="icon" id="favicon" href="">
    <link rel="stylesheet" href="static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-overlay"></div>

    <header class="glass-header">
        <div class="container header-content">
            <div class="header-left">
                <h1 class="site-title"><span id="nickname"></span>的追番列表</h1>
                <p class="update-time">最后更新: <span id="update-time">-</span></p>
            </div>
            <div class="header-right">
                <a class="avatar-link" id="avatar-link" href="#" target="_blank">
                    <img class="avatar" id="avatar" src="" alt="avatar">
                </a>
                <a class="bangumi-btn" id="bangumi-btn" href="https://bgm.tv/user/wutong" target="_blank">前往 Bangumi</a>
            </div>
        </div>
    </header>

    <nav class="glass-nav">
        <div class="container nav-content">
            <div class="nav-tabs" id="nav-tabs">
                <button class="nav-tab active" data-status="all"><span class="tab-name">全部</span><span class="tab-count">(<span id="count-all">0</span>)</span></button>
                <button class="nav-tab" data-status="3"><span class="tab-name">在看</span><span class="tab-count">(<span id="count-doing">0</span>)</span></button>
                <button class="nav-tab" data-status="2"><span class="tab-name">看过</span><span class="tab-count">(<span id="count-done">0</span>)</span></button>
                <button class="nav-tab" data-status="1"><span class="tab-name">想看</span><span class="tab-count">(<span id="count-wish">0</span>)</span></button>
                <button class="nav-tab" data-status="4"><span class="tab-name">搁置</span><span class="tab-count">(<span id="count-onhold">0</span>)</span></button>
                <button class="nav-tab search-tab" id="search-toggle">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                </button>
            </div>
            <input type="text" class="search-input" id="search" placeholder="搜索番剧...">
        </div>
    </nav>

    <main class="container">
        <div class="anime-grid" id="anime-grid">
            <div class="loading">加载中...</div>
        </div>
    </main>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal glass-modal">
            <button class="modal-close" id="modal-close">&times;</button>
            <div class="modal-body">
                <!-- 第一排：封面 + 名称 -->
                <div class="modal-row modal-row-cover">
                    <div class="modal-cover-wrap">
                        <img class="modal-cover" id="modal-cover" src="" alt="">
                    </div>
                    <div class="modal-cover-info">
                        <h2 class="modal-name-cn" id="modal-name-cn"></h2>
                        <p class="modal-name" id="modal-name"></p>
                        <a class="bangumi-btn modal-bangumi-btn" id="modal-bangumi-btn" href="#" target="_blank">前往 Bangumi</a>
                    </div>
                </div>
                <!-- 第二排：信息 -->
                <div class="modal-row modal-row-info">
                    <div class="modal-info-cell">
                        <span class="modal-label">追番状态</span>
                        <span class="modal-value" id="modal-status"></span>
                    </div>
                    <div class="modal-info-cell">
                        <span class="modal-label">评分</span>
                        <span class="modal-value" id="modal-score"></span>
                    </div>
                    <div class="modal-info-cell">
                        <span class="modal-label">集数</span>
                        <span class="modal-value" id="modal-eps"></span>
                    </div>
                    <div class="modal-info-cell">
                        <span class="modal-label">开播日期</span>
                        <span class="modal-value" id="modal-date"></span>
                    </div>
                </div>
                <!-- 第三排：标签 -->
                <div class="modal-row modal-row-tags">
                    <span class="modal-label">标签</span>
                    <div class="modal-tags" id="modal-tags"></div>
                </div>
                <!-- 第四排：简介 -->
                <div class="modal-row modal-row-summary">
                    <span class="modal-label">简介</span>
                    <p class="modal-summary" id="modal-summary"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- 返回顶部 -->
    <button class="back-to-top" id="back-to-top">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 15l-6-6-6 6"/>
        </svg>
    </button>

    <footer>
        <div class="container">
            <p>作者：<a href="https://www.bestwutong.top/" target="_blank">無同</a> | 开源地址：<a href="https://github.com/bestWuTong/Bangumi_AniList" target="_blank">Bangumi_AniList</a> | 数据来源: <a href="https://bgm.tv" target="_blank">Bangumi</a> | 每日自动更新</p>
        </div>
    </footer>

    <script src="static/script.js"></script>
</body>
</html>
